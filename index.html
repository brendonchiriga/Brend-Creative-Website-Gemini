<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brend Creative | Digital Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                dark: '#0B0B15',
                card: '#151525',
                purple: '#ff0000', // Renamed concept to Red
                cyan: '#faff00',   // Renamed concept to Yellow
              }
            },
            keyframes: {
              borderBeam: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              },
              fadeInUpBlur: {
                '0%': { 
                  opacity: 0,
                  transform: 'translateY(24px)',
                  filter: 'blur(8px)'
                },
                '100%': { 
                  opacity: 1,
                  transform: 'translateY(0)',
                  filter: 'blur(0)'
                },
              }
            },
            animation: {
              'border-beam': 'borderBeam 2s linear infinite',
              'fade-in-up-blur': 'fadeInUpBlur 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0B0B15;
        color: #ffffff;
      }
      .gradient-text {
        background: linear-gradient(to right, #ff0000, #faff00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .gradient-bg {
        background: linear-gradient(to right, #ff0000, #faff00);
      }
      .grid-bg {
        background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .animate-blink {
        animation: blink 1s infinite;
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      
      /* Animation Classes for ScrollReveal */
      .animate-on-scroll {
        opacity: 0;
      }
      .animate-active {
        animation: fadeInUpBlur 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
    </style>

<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
